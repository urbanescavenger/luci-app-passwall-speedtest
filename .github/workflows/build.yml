name: Compile passwall-speedtest LuCI App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve latest snapshot SDK URL
        id: snapsdk
        run: |
          base="https://downloads.openwrt.org/snapshots/targets/x86/64/"
          file="$(curl -sSLk "$base" | grep -oE 'openwrt-sdk-x86-64_[A-Za-z0-9._-]+\.tar\.zst' | head -n1)"
          [ -n "$file" ] || { echo "No snapshot SDK found at $base"; exit 1; }
          echo "url=${base}${file}" >> "$GITHUB_OUTPUT"
          echo "Resolved snapshot SDK: ${base}${file}"

      - name: Build LuCI Package
        id: build
        uses: stevenjoezhang/build-luci-app@v1
        with:
          package: luci-app-passwall-speedtest
          sdk-url: https://archive.openwrt.org/releases/21.02.0/targets/x86/64/openwrt-sdk-21.02.0-x86-64_gcc-8.4.0_musl.Linux-x86_64.tar.xz
          snapsdk-url: ${{ steps.snapsdk.outputs.url }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./artifacts/*
          name: Release v${{ steps.build.outputs.version }}
          tag_name: ${{ github.ref_name }}
